<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云朵实验室 ☁️ - 让协作更有趣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #FFF0F5;
            color: #475569;
            overflow-x: hidden;
        }

        .login-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* 左侧品牌区 */
        .brand-section {
            width: 40%;
            background: linear-gradient(135deg, #FFB7C5 0%, #E0BBE4 100%);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px;
            overflow: hidden;
        }

        @media (prefers-color-scheme: dark) {
            .brand-section {
                background: linear-gradient(135deg, #CC929E 0%, #A88DB0 100%);
            }
        }

        .brand-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23ffffff" fill-opacity="0.1" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,112C672,96,768,96,864,112C960,128,1056,160,1152,160C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .brand-logo svg {
            width: 50px;
            height: 50px;
            color: white;
        }

        .brand-logo svg path:first-child {
            stroke: white;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .brand-slogan {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 40px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 14px;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .feature-icon::before {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        /* 右侧表单区 */
        .form-section {
            width: 60%;
            background: #FFFFFF;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-title {
            font-size: 24px;
            font-weight: 600;
            color: #4A3E4F;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .form-subtitle {
            font-size: 14px;
            color: #94A3B8;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            font-size: 14px;
            color: #1E293B;
            transition: all 0.3s ease;
            background: #FFFFFF;
        }

        .form-input:focus {
            outline: none;
            border-color: #FFB7C5;
            box-shadow: 0 0 0 3px rgba(255, 183, 197, 0.1);
        }

        .form-input::placeholder {
            color: #94A3B8;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #94A3B8;
            pointer-events: none;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #FFB7C5;
            cursor: pointer;
        }

        .forgot-password {
            color: #FFB7C5;
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #FFC0CB;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #FFB7C5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            background:  #FFC0CB;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 183, 197, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0;
            color: #94A3B8;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #E2E8F0;
        }

        .divider span {
            padding: 0 16px;
        }

        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            color: #475569;
        }

        .social-btn:hover {
            border-color: #FFB7C5;
            background: #FFF0F5;
        }

        .register-link {
            text-align: center;
            font-size: 14px;
            color: #475569;
        }

        .register-link a {
            color: #FFB7C5;
            text-decoration: none;
            font-weight: 500;
            margin-left: 4px;
        }

        .register-link a:hover {
            color: #FFC0CB;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .brand-section {
                width: 35%;
                padding: 40px;
            }

            .form-section {
                width: 65%;
                padding: 40px;
            }
        }

        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
            }

            .brand-section {
                width: 100%;
                min-height: 300px;
                padding: 40px 30px;
            }

            .brand-title {
                font-size: 28px;
            }

            .brand-slogan {
                font-size: 16px;
            }

            .form-section {
                width: 100%;
                padding: 40px 30px;
            }
        }

        @media (max-width: 480px) {
            .brand-section {
                padding: 30px 20px;
                min-height: 250px;
            }

            .brand-logo {
                width: 60px;
                height: 60px;
                margin-bottom: 20px;
            }

            .brand-title {
                font-size: 24px;
            }

            .form-section {
                padding: 30px 20px;
            }

            .social-login {
                flex-direction: column;
            }
        }

        /* 暗黑模式支持 */
        @media (prefers-color-scheme: dark) {
            body {
                background: #0F172A;
            }

            .form-section {
                background: #1E293B;
            }

            .form-title {
                color: #F1F5F9;
            }

            .form-label {
                color: #CBD5E1;
            }

            .form-input {
                background: #334155;
                border-color: #475569;
                color: #F1F5F9;
            }

            .form-input:focus {
                border-color: #FFB7C5;
                box-shadow: 0 0 0 3px rgba(255, 183, 197, 0.2);
            }

            .submit-btn {
                background: #CC929E;
            }

            .submit-btn:hover {
                background: #D4A0AB;
            }

            .social-btn {
                background: #334155;
                border-color: #475569;
                color: #CBD5E1;
            }

            .social-btn:hover {
                background: #475569;
            }

            .divider {
                color: #64748B;
            }

            .divider::before,
            .divider::after {
                background: #475569;
            }

            .register-link {
                color: #CBD5E1;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- 左侧品牌区 -->
        <div class="brand-section">
            <div class="brand-content">
                <div class="brand-logo">
                    <svg viewBox="0 0 28 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                              d="M17.5 19.5h-11A4.5 4.5 0 0 1 2 15a4.5 4.5 0 0 1 4.5-4.5 1 1 0 0 1 .8-.4 6 6 0 0 1 11.2-2.1 1 1 0 0 1 1 .5 4 4 0 0 1 4.5 4c0 2.5-2.2 4.5-5 4.5Z"/>
                        <path fill="#FFD700" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                              d="m21 4 0.8 2.5 2.5 0.8-2.5 0.8-0.8 2.5-0.8-2.5-2.5-0.8 2.5-0.8 0.8-2.5z"/>
                    </svg>
                </div>
                <h1 class="brand-title">云朵实验室</h1>
                <p class="brand-slogan">让协作像撸猫一样治愈</p>

                <div class="brand-features">
                    <div class="feature-item">
                        <div class="feature-icon"></div>
                        <span>智能项目管理，效率蹭蹭涨 📈</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"></div>
                        <span>数据可视化，决策不再头秃 💡</span>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"></div>
                        <span>跨平台协作，摸鱼也要优雅 ☕</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧表单区 -->
        <div class="form-section">
            <div class="form-container">
                <div class="form-header">
                    <h2 class="form-title">欢迎回来，最厉害的指挥官大人 ٩(๑><๑)۶</h2>
                    <p class="form-subtitle">今天也要元气满满地写bug哦~</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">账号</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="username" class="form-input" placeholder="请输入你的神秘代号" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">密码</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" class="form-input" placeholder="嘘~这是秘密哦" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>记住我嘛 (｡♥‿♥｡)</span>
                        </label>
                        <a href="#" class="forgot-password">密码被喵星人吃了？</a>
                    </div>

                    <button type="submit" class="submit-btn" id="loginBtn">开始冒险 ✨</button>
                </form>

                <div class="divider">
                    <span>或者换个姿势登录</span>
                </div>

                <div class="social-login">
                    <button class="social-btn" onclick="handleSocialLogin('wechat')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#07C160">
                            <path d="M8.5 11a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm5 0a1 1 0 1 0 0-2 1 1 0 0 0 0 2z"/>
                            <path d="M12 2C6.48 2 2 6.03 2 11c0 2.87 1.5 5.43 3.84 7.13-.12.88-.48 2.14-1.06 3.22 1.6-.45 3.03-1.11 4.1-1.76.96.27 1.98.41 3.12.41 5.52 0 10-4.03 10-9s-4.48-9-10-9zm-6.5 8a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm13 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
                        </svg>
                        企业微信
                    </button>
                    <button class="social-btn" onclick="handleSocialLogin('dingtalk')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="#0089FF">
                            <path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L19.18 8 12 11.82 4.82 8 12 4.18zM4 9.68l7 3.5V19.5l-7-3.5v-6.32zm9 9.82v-6.32l7-3.5v6.32l-7 3.5z"/>
                        </svg>
                        钉钉
                    </button>
                </div>

                <div class="register-link">
                    还没有账号？<a href="#" onclick="showRegister()">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            try {
                console.log('🚀 开始施法...', { username: username, timestamp: new Date().toISOString() });

                loginBtn.classList.add('loading');
                loginBtn.textContent = '正在施法中...';

                setTimeout(() => {
                    console.log('✨ 施法完成，准备传送...');

                    loginBtn.classList.remove('loading');
                    loginBtn.textContent = '传送成功！';
                    loginBtn.style.background = '#10B981';

                    // 使用绝对路径逻辑，确保手机端能精准定位
                    const path = window.location.pathname;
                    const dir = path.substring(0, path.lastIndexOf('/') + 1);
                    const targetUrl = dir + 'dashboard.html';

                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 300);
                }, 1500);
            } catch (error) {
                console.error('💥 施法出错:', error);
                loginBtn.classList.remove('loading');
                loginBtn.textContent = '开始冒险 ✨';
                alert('发生错误：' + error.message);
            }
        });

        // 第三方登录
        function handleSocialLogin(platform) {
            const platformName = platform === 'wechat' ? '企业微信' : '钉钉';
            alert(`正在使用${platformName}登录...`);
        }

        // 显示注册页面（示例）
        function showRegister() {
            alert('注册功能开发中...');
        }

        // 输入框焦点效果增强
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'scale(1.02)';
                this.parentElement.style.transition = 'transform 0.2s ease';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // 记住密码功能
        window.addEventListener('load', function() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('remember').checked = true;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const remember = document.getElementById('remember').checked;
            const username = document.getElementById('username').value;

            if (remember) {
                localStorage.setItem('rememberedUser', username);
            } else {
                localStorage.removeItem('rememberedUser');
            }
        });
    </script>
</body>
</html>
